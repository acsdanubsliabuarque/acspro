<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACS PRO V12.2</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header><h2>ACS PRO V12.2 - OSASCO</h2><div id="contagem"></div></header>
<div class="container">
    <!-- HOME -->
    <div id="tela-home">
        <div class="card">
            <h3>BUSCA</h3>
            <input type="text" id="h-nome" placeholder="NOME...">
            <button class="btn btn-main" onclick="UI.searchPessoa()">PESQUISAR</button>
            <select id="h-rua" class="select-ruas"></select>
            <div class="grid-2"><input type="text" id="h-num" placeholder="Nº"><button class="btn btn-outline" onclick="UI.searchEndereco()">VER RUA</button></div>
        </div>
        <div class="grid-2">
            <button class="btn btn-main" onclick="Registry.startNew()">+ NOVO INDIVIDUAL</button>
            <button class="btn btn-main" style="background:#2e7d32" onclick="Registry.startNewDomicilio()">+ NOVO DOMICÍLIO</button>
        </div>
        <button class="btn btn-outline" onclick="Visits.viewPendencies()">PENDÊNCIAS</button>
        <div class="card" style="text-align:center">
            <div class="grid-2">
                <button class="btn btn-sm btn-outline" onclick="Backup.createBackup()">BACKUP</button>
                <button class="btn btn-sm btn-outline" onclick="Backup.exportCSV()">EXCEL</button>
            </div>
            <input type="file" onchange="Backup.restoreBackup(event)" style="margin-top:10px">
        </div>
    </div>
    <!-- RESULTADOS -->
    <div id="tela-resultados" class="hidden">
        <div class="grid-3" style="margin-bottom:15px">
            <button class="btn btn-sm btn-outline" onclick="UI.changeView('full')">COMPLETO</button>
            <button class="btn btn-sm btn-outline" onclick="UI.changeView('compact')">COMPACTO</button>
            <button class="btn btn-sm btn-outline" onclick="UI.changeView('list')">LISTA</button>
        </div>
        <div id="lista-resultados"></div>
        <button class="btn btn-outline" onclick="Nav.goBack()">VOLTAR</button>
    </div>
    <!-- CADASTRO -->
    <div id="tela-cadastro" class="hidden">
        <button class="btn btn-save" onclick="Registry.save()">GRAVAR TUDO</button>
        <div id="passo-1" class="card">
            <h3>1. IDENTIFICAÇÃO</h3>
            <input type="text" id="c-nome" placeholder="NOME COMPLETO">
            <input type="text" id="c-nasc" placeholder="NASCIMENTO (DD/MM/AAAA)">
            <input type="text" id="c-nome-social" placeholder="NOME SOCIAL">
            <input type="text" id="c-cpf" placeholder="CPF">
            <select id="c-is-resp" onchange="Registry.toggleRelacao()"><option value="SIM">CHEFE DE FAMÍLIA</option><option value="NAO">DEPENDENTE</option></select>
            <div id="div-parentesco" class="hidden"><select id="c-relacao"><option value="FILHO">FILHO(A)</option><option value="CONJUGE">CÔNJUGE</option></select></div>
            <button class="btn btn-main" onclick="Registry.setStep(2)">ENDEREÇO >></button>
        </div>
        <div id="passo-2" class="hidden card">
            <h3>2. ENDEREÇO</h3>
            <select id="c-rua" class="select-ruas" onchange="Registry.checkAddressConflict()"></select>
            <input type="text" id="c-num" placeholder="Nº" onblur="Registry.checkAddressConflict()">
            <input type="text" id="c-comp" placeholder="COMPLEMENTO">
            <button class="btn btn-main" onclick="Registry.setStep(3)">SAÚDE >></button>
        </div>
        <div id="passo-3" class="hidden card">
            <h3>3. SAÚDE</h3>
            <label><input type="checkbox" id="ch-hiper"> HIPERTENSÃO</label>
            <label><input type="checkbox" id="ch-diab"> DIABETES</label>
            <label><input type="checkbox" id="ch-gest" onchange="Registry.toggleDum()"> GESTANTE</label>
            <div id="div-gestante" class="hidden"><input type="text" id="c-dum" placeholder="DUM"></div>
            <label><input type="checkbox" id="ch-mental"> SAÚDE MENTAL</label>
        </div>
    </div>
    <!-- VISITA -->
    <div id="tela-visita" class="hidden">
        <div class="card">
            <h3 id="v-nome-label"></h3>
            <div id="v-familiares-area"></div>
            <input type="text" id="v-data" readonly>
            <div class="grid-2"><input type="text" id="v-pa" placeholder="PA"><input type="text" id="v-hgt" placeholder="HGT"></div>
            <textarea id="v-relato" placeholder="RELATO DA VISITA..."></textarea>
            <input type="text" id="v-pendencia" placeholder="NOTAR PENDÊNCIA...">
        </div>
        <button class="btn btn-save" onclick="Visits.save()">SALVAR VISITA</button>
    </div>
    <!-- HISTORICO -->
    <div id="tela-historico" class="hidden"><div id="lista-historico"></div><button class="btn btn-outline" onclick="Nav.goBack()">VOLTAR</button></div>
</div>
<nav class="footer-nav">
    <div class="nav-item" onclick="Nav.goTo('tela-home', true)">INÍCIO</div>
    <div class="nav-item" onclick="Visits.viewPendencies()">PENDÊNCIAS</div>
    <div class="nav-item" onclick="Nav.goBack()">VOLTAR</div>
</nav>
<script src="database.js"></script><script src="utils.js"></script><script src="registry.js"></script><script src="visits.js"></script><script src="app.js"></script>
</body>
</html>
