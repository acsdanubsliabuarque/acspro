<!-- 001: DECLARACAO DE TIPO DE DOCUMENTO E IDIOMA -->
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <!-- 002: CONFIGURACOES DE CODIFICACAO E RESPONSIVIDADE -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ACS PRO V12.2 - OSASCO FIELD SYSTEM</title>
    
    <!-- 003: REFERENCIA AO ARQUIVO DE ESTILOS EXTERNO -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 004: AREA DO CABECALHO FIXO -->
<header>
    <h2 style="margin:0; font-size: 18px;">ACS PRO V12.2 - OSASCO</h2>
    <div id="contagem" style="font-size: 11px; font-weight: normal;">BASE DE DADOS: CARREGANDO...</div>
</header>

<div class="container">

    <!-- 005: TELA HOME - PESQUISA E ACESSOS RAPIDOS -->
    <div id="tela-home">
        <div class="card" style="border-left-color: var(--secondary)">
            <h3>BUSCA GERAL</h3>
            <input type="text" id="h-nome" placeholder="NOME DO CIDADÃO..." autocomplete="off">
            <button class="btn btn-main" id="btn-buscar-nome" onclick="UI.searchPessoa()">PESQUISAR NOME</button>
            <hr style="opacity:0.1; margin: 15px 0;">
            <label>FILTRAR POR RUA / LOGRADOURO</label>
            <select id="h-rua" class="select-ruas"></select>
            <div class="grid-2">
                <input type="text" id="h-num" placeholder="NÚMERO">
                <button class="btn btn-outline" onclick="UI.searchEndereco()">VER RUA</button>
            </div>
        </div>

        <div class="grid-2">
            <button class="btn btn-main" style="background:#512da8" onclick="Registry.startNew()">+ NOVO INDIVIDUAL</button>
            <button class="btn btn-main" style="background:#388e3c" onclick="Registry.startNewDomicilio()">+ NOVO DOMICÍLIO</button>
        </div>

        <div class="grid-2">
            <button class="btn btn-outline" onclick="Visits.viewPendencies()">PENDÊNCIAS</button>
            <button class="btn btn-outline" onclick="Nav.goTo('tela-arquivo-pendencia')">ARQUIVO MORTO</button>
        </div>

        <!-- 006: AREA DE BACKUP E EXPORTACAO -->
        <div class="card" style="background:#eee; border-left:none; text-align:center;">
            <h4 style="margin-top:0">GESTÃO DE DADOS (OSASCO)</h4>
            <div class="grid-2">
                <button class="btn btn-sm btn-outline" onclick="Backup.createBackup()">GERAR BACKUP</button>
                <button class="btn btn-sm btn-outline" onclick="Backup.exportCSV()">PLANILHA EXCEL</button>
            </div>
            <input type="file" id="file-input" style="font-size:10px; margin-top:10px" onchange="Backup.restoreBackup(event)">
        </div>
    </div>

    <!-- 007: TELA DE RESULTADOS COM SELETOR DE MODOS DE VISUALIZACAO -->
    <div id="tela-resultados" class="hidden">
        <div style="display: flex; gap: 5px; margin-bottom: 15px;">
            <button class="btn btn-sm btn-outline" onclick="UI.changeView('full')">COMPLETO</button>
            <button class="btn btn-sm btn-outline" onclick="UI.changeView('compact')">COMPACTO</button>
            <button class="btn btn-sm btn-outline" onclick="UI.changeView('list')">LISTA</button>
        </div>
        <div id="lista-resultados"></div>
        <button class="btn btn-outline" onclick="Nav.goBack()">VOLTAR</button>
    </div>

    <!-- 008: TELA DE CADASTRO INDIVIDUAL -->
    <div id="tela-cadastro" class="hidden">
        <button class="btn btn-save" onclick="Registry.save()">CONCLUIR E GRAVAR TUDO</button>

        <div id="passo-1">
            <div class="card">
                <h3>1. IDENTIFICAÇÃO</h3>
                <label>NOME COMPLETO *</label><input type="text" id="c-nome" placeholder="OBRIGATÓRIO">
                <div class="grid-2">
                    <div><label>NASCIMENTO *</label><input type="text" id="c-nasc" placeholder="DD/MM/AAAA"></div>
                    <div><label>IDADE</label><input type="text" id="c-idade-display" readonly style="background:#f0f0f0"></div>
                </div>
                <label>NOME SOCIAL</label><input type="text" id="c-nome-social">
                <div class="grid-2">
                    <div><label>SEXO</label><select id="c-sexo"><option value="MASCULINO">MASCULINO</option><option value="FEMININO">FEMININO</option></select></div>
                    <div><label>RAÇA/COR</label><select id="c-raca"><option value="BRANCA">BRANCA</option><option value="PRETA">PRETA</option><option value="PARDA">PARDA</option><option value="AMARELA">AMARELA</option><option value="INDÍGENA">INDÍGENA</option></select></div>
                </div>
                <label>NOME DA MÃE</label><input type="text" id="c-mae">
                <label>NOME DO PAI</label><input type="text" id="c-pai">
                <div class="grid-2">
                    <div><label>CPF *</label><input type="text" id="c-cpf" class="mask-cpf"></div>
                    <div><label>CNS</label><input type="text" id="c-cns"></div>
                </div>
                <div class="grid-2">
                    <div><label>NACIONALIDADE</label><select id="c-nacionalidade"><option value="BRASILEIRA">BRASILEIRA</option><option value="ESTRANGEIRA">ESTRANGEIRA</option></select></div>
                    <div><label>CELULAR</label><input type="text" id="c-tel" class="mask-tel"></div>
                </div>
            </div>
            <button class="btn btn-outline" onclick="Registry.setStep(2)">ENDEREÇO >></button>
        </div>

        <div id="passo-2" class="hidden">
            <div class="card">
                <h3>2. LOGRADOURO E FAMÍLIA</h3>
                <label>RUA / LOGRADOURO *</label>
                <select id="c-rua" class="select-ruas" onchange="Registry.checkAddressConflict()"></select>
                <div class="grid-3">
                    <div><label>Nº *</label><input type="text" id="c-num" onblur="Registry.checkAddressConflict()"></div>
                    <div><label>MA</label><input type="text" id="c-ma" placeholder="00"></div>
                    <div><label>SEG</label><input type="text" id="c-seg" placeholder="0"></div>
                </div>
                <label>COMPLEMENTO</label>
                <input type="text" id="c-comp" placeholder="CASA 1, FUNDOS, ETC">
                
                <hr>
                <label>RESPONSÁVEL FAMILIAR?</label>
                <select id="c-is-resp" onchange="Registry.toggleRelacao()"><option value="SIM">SIM (CHEFE)</option><option value="NAO">NÃO (DEPENDENTE)</option></select>
                <div id="div-parentesco" class="hidden">
                    <label>PARENTESCO COM O CHEFE</label>
                    <select id="c-relacao">
                        <option value="CÔNJUGE">CÔNJUGE / COMPANHEIRO(A)</option>
                        <option value="FILHO(A)">FILHO(A)</option>
                        <option value="ENTEADO(A)">ENTEADO(A)</option>
                        <option value="NETO(A)">NETO(A) / BISNETO(A)</option>
                        <option value="PAI/MÃE">PAI / MÃE</option>
                        <option value="IRMÃO/IRMÃ">IRMÃO / IRMÃ</option>
                        <option value="OUTRO PARENTE">OUTRO PARENTE</option>
                        <option value="NÃO PARENTE">NÃO PARENTE</option>
                    </select>
                </div>
            </div>
            <button class="btn btn-outline" onclick="Registry.setStep(1)"> << VOLTAR</button>
            <button class="btn btn-outline" onclick="Registry.setStep(3)">SAÚDE >></button>
        </div>

        <div id="passo-3" class="hidden">
            <div class="card">
                <h3>3. CONDIÇÕES DE SAÚDE</h3>
                <div style="display: grid; grid-template-columns: 1fr; gap: 8px;">
                    <label class="check-box"><input type="checkbox" id="ch-hiper"> HIPERTENSÃO ARTERIAL</label>
                    <label class="check-box"><input type="checkbox" id="ch-diab"> DIABETES MELLITUS</label>
                    <label class="check-box"><input type="checkbox" id="ch-gest" onchange="Registry.toggleDum()"> GESTANTE</label>
                    <div id="div-gestante" class="hidden" style="padding-left:15px; border-left:4px solid var(--gestante-pink)">
                        <label>DUM (ÚLTIMA MENSTRUAÇÃO)</label>
                        <input type="text" id="c-dum" placeholder="DD/MM/AAAA">
                    </div>
                    <label class="check-box"><input type="checkbox" id="ch-mental"> SAÚDE MENTAL</label>
                    <label class="check-box"><input type="checkbox" id="ch-acamado"> ACAMADO / DOMICILIADO</label>
                    <label class="check-box"><input type="checkbox" id="ch-fumante"> FUMANTE</label>
                    <label class="check-box"><input type="checkbox" id="ch-alcool"> USO DE ÁLCOOL</label>
                </div>
                <label>OBSERVAÇÕES PERMANENTES</label>
                <textarea id="c-obs" rows="3"></textarea>
            </div>
            <button class="btn btn-outline" onclick="Registry.setStep(2)"> << VOLTAR</button>
        </div>
    </div>

    <!-- 009: TELA DE REGISTRO DE VISITA -->
    <div id="tela-visita" class="hidden">
        <div class="card">
            <h3 id="v-nome-label">VISITA</h3>
            <!-- 010: CORREÇÃO CRITICAL: ESTE ID DEVE EXISTIR PARA O VISITS.JS -->
            <div id="v-familiares-area"></div>
            
            <div class="grid-2">
                <div><label>DATA</label><input type="text" id="v-data" readonly></div>
                <div><label>TURNO</label><select id="v-turno"><option value="MANHÃ">MANHÃ</option><option value="TARDE">TARDE</option><option value="NOITE">NOITE</option></select></div>
            </div>
            
            <label>MOTIVOS DA VISITA (SISAB)</label>
            <div class="grid-check" style="max-height: 150px; overflow-y: auto; border: 1px solid #ddd; padding: 10px;">
                <label><input type="checkbox" name="v-motivo" value="CADASTRAMENTO/ATUALIZAÇÃO"> CADASTRAMENTO/ATUALIZAÇÃO</label>
                <label><input type="checkbox" name="v-motivo" value="VISITA PERIÓDICA"> VISITA PERIÓDICA</label>
                <label><input type="checkbox" name="v-motivo" value="GESTANTE"> ACOMP. GESTANTE</label>
                <label><input type="checkbox" name="v-motivo" value="HIPERTENSO"> ACOMP. HIPERTENSO</label>
                <label><input type="checkbox" name="v-motivo" value="DIABÉTICO"> ACOMP. DIABÉTICO</label>
                <label><input type="checkbox" name="v-motivo" value="SAÚDE MENTAL"> ACOMP. SAÚDE MENTAL</label>
            </div>

            <div class="grid-2" style="background: #f9f9f9; padding: 10px; margin-top:10px; border-radius: 8px;">
                <div><label>PA (S/D)</label><input type="text" id="v-pa" placeholder="12/8"></div>
                <div><label>HGT</label><input type="text" id="v-hgt" placeholder="000"></div>
            </div>

            <label>RELATO DA VISITA</label>
            <textarea id="v-relato" rows="4"></textarea>
            
            <label>NOTAR PENDÊNCIA?</label>
            <input type="text" id="v-pendencia">
        </div>
        <button class="btn btn-save" onclick="Visits.save()">SALVAR VISITA</button>
        <button class="btn btn-outline" onclick="Nav.confirmExit('tela-home')">CANCELAR</button>
    </div>

    <!-- 011: TELA DE HISTORICO -->
    <div id="tela-historico" class="hidden">
        <h3 id="hist-nome">HISTÓRICO</h3>
        <div id="lista-historico"></div>
        <button class="btn btn-outline" onclick="Nav.goBack()">VOLTAR</button>
    </div>

    <!-- 012: TELA DE ARQUIVO MORTO -->
    <div id="tela-arquivo-pendencia" class="hidden">
        <h3>ARQUIVO DE PENDÊNCIAS</h3>
        <div id="lista-pendencias-arquivo"></div>
        <button class="btn btn-outline" onclick="Nav.goTo('tela-home', true)">INÍCIO</button>
    </div>

</div>

<!-- 013: BARRA DE NAVEGACAO INFERIOR -->
<nav class="footer-nav">
    <div class="nav-item" onclick="Nav.goTo('tela-home', true)">INÍCIO</div>
    <div class="nav-item" onclick="Visits.viewPendencies()">PENDÊNCIAS</div>
    <div class="nav-item" onclick="Nav.confirmExit('voltar')">VOLTAR</div>
</nav>

<!-- 014: IMPORTACAO EM ORDEM RIGIDA DE DEPENDENCIA -->
<script src="database.js"></script>
<script src="utils.js"></script>
<script src="registry.js"></script>
<script src="visits.js"></script>
<script src="app.js"></script>

</body>
</html>
